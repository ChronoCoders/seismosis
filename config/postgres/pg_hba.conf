# ============================================================
# pg_hba.conf — PostgreSQL Client Authentication
# ============================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD
#
# "local" connections use Unix socket (no network).
# "host"  connections use TCP/IP.
# md5 = password hashed with md5 (acceptable for Docker-internal traffic).
# scram-sha-256 = stronger, use in production with client support.

# Local socket connections (internal to container)
local   all             all                                     trust

# Localhost loopback — trust for dev tooling (sqlx prepare, psql, DBeaver)
# Safe: nothing sensitive is reachable outside this machine in dev.
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Docker bridge gateway (172.28.0.1) — host dev tooling (sqlx prepare, DBeaver)
# Arrives as the gateway IP when connecting via Docker port mapping from the host.
host    all             all             172.28.0.1/32           trust

# Docker network (seismosis-net: 172.28.0.0/16)
# All application services authenticate with password.
host    seismosis       seismosis       172.28.0.0/16           scram-sha-256
host    seismosis       seismosis_reader 172.28.0.0/16          scram-sha-256

# Postgres exporter monitoring user
host    seismosis       seismosis       172.28.0.0/16           scram-sha-256

# Dev host machine (for cargo sqlx prepare, DBeaver, etc.)
# Only needed when another postgres is already bound to 127.0.0.1:5432.
host    all             all             192.168.1.4/32          trust

# Deny all other connections
host    all             all             all                     reject
