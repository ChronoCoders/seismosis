# ============================================================
# postgresql.conf — Seismosis Platform
# ============================================================
# Tuned for: write-heavy time-series workload (seismic events),
# spatial queries (PostGIS), and JSONB raw payload storage.
#
# Container sizing assumption: 2 CPU, 2GB RAM.
# Adjust shared_buffers, work_mem, and max_connections if
# the container memory limit changes.
#
# See: https://pgtune.leopard.in.ua/ for guidance.

# ─── Connection Settings ─────────────────────────────────────
# Listen on all interfaces so Docker port mapping (host:5433 → container:5432)
# works. pg_hba.conf governs which clients are actually permitted to connect.
listen_addresses = '*'

# Max simultaneous client connections.
# Application services use connection pooling (PgBouncer in Phase 2).
# 100 leaves headroom for DBA connections and exporters.
max_connections = 100

# Reserve connections for superuser (monitoring, emergency access).
superuser_reserved_connections = 3

# ─── Memory ──────────────────────────────────────────────────
# shared_buffers: primary PostgreSQL buffer cache.
# Rule of thumb: 25% of available RAM.
# For 2GB container: 512MB.
shared_buffers = 512MB

# work_mem: per-sort/hash operation memory.
# With max_connections=100 and complex spatial queries,
# set conservatively to avoid OOM. Raise per-session if needed.
work_mem = 16MB

# maintenance_work_mem: for VACUUM, CREATE INDEX, ALTER TABLE.
# Higher = faster index builds and vacuums.
maintenance_work_mem = 128MB

# effective_cache_size: hint to planner about OS filesystem cache.
# Set to ~75% of total RAM (OS + shared_buffers).
effective_cache_size = 1536MB

# huge_pages: try to use Linux huge pages for shared_buffers.
# Reduces TLB pressure. Falls back gracefully if unavailable.
huge_pages = try

# ─── Write-Ahead Log (WAL) ───────────────────────────────────
# wal_level: logical is required for logical replication (Phase 2).
# minimal < replica < logical. Minimal overhead difference.
wal_level = replica

# wal_buffers: WAL write buffer. -1 = auto (1/32 of shared_buffers).
# 16MB is a good explicit value for write-heavy workloads.
wal_buffers = 16MB

# checkpoint_completion_target: spread checkpoint writes over this
# fraction of the checkpoint interval to reduce I/O spikes.
checkpoint_completion_target = 0.9

# max_wal_size: trigger checkpoint when WAL grows beyond this.
# 2GB gives room for burst writes without constant checkpointing.
max_wal_size = 2GB

# min_wal_size: keep this much WAL on disk to avoid recreation.
min_wal_size = 256MB

# wal_compression: compress WAL records. Reduces WAL size by ~30-50%.
# Slight CPU overhead; worth it for I/O-bound workloads.
wal_compression = zstd

# synchronous_commit: 'off' allows ~1 WAL buffer flush latency of
# data loss risk in exchange for much higher write throughput.
# For seismic events (also in Redpanda), 'off' is acceptable.
# Use 'on' for financial/critical data.
synchronous_commit = off

# ─── Background Writer ───────────────────────────────────────
# Tune bgwriter to reduce checkpoint I/O spikes.
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# ─── Autovacuum ──────────────────────────────────────────────
# Enable autovacuum. Required for table health and planner stats.
autovacuum = on

# Slightly more aggressive autovacuum for append-heavy tables.
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Reduce I/O impact of autovacuum on query performance.
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 400

# ─── Planner ─────────────────────────────────────────────────
# Correct I/O cost for SSD storage (Docker volumes are typically SSD).
# random_page_cost default is 4.0 (HDD). 1.1 = SSD.
random_page_cost = 1.1

# Effective I/O concurrency for bitmap heap scans on SSD.
effective_io_concurrency = 200

# Enable parallel query for large spatial aggregations.
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# PostGIS-specific planner improvements.
enable_partitionwise_join = on
enable_partitionwise_aggregate = on

# JIT compilation: beneficial for complex analytical queries.
# Keep off for OLTP-heavy Phase 1 (overhead on short queries).
jit = off

# ─── Logging ─────────────────────────────────────────────────
# Log destination: stderr (captured by Docker).
log_destination = 'stderr'
logging_collector = off    # off = log to stderr directly (Docker handles rotation)

# Log queries slower than 1 second.
log_min_duration_statement = 1000

# Log checkpoint activity (helps diagnose I/O spikes).
log_checkpoints = on

# Do not log every connection — too noisy with connection pooling.
log_connections = off
log_disconnections = off

# Log lock waits longer than 500ms.
log_lock_waits = on
deadlock_timeout = 500ms

# Log format: useful for structured log aggregation.
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Log autovacuum activity for tables taking > 250ms.
log_autovacuum_min_duration = 250ms

# ─── Statistics ──────────────────────────────────────────────
# Required by pg_stat_statements (loaded in 01_extensions.sql).
shared_preload_libraries = 'pg_stat_statements'

# Track all statement types.
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# Track I/O timing for query planning.
track_io_timing = on

# ─── Locale ──────────────────────────────────────────────────
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'
