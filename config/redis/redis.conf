# ============================================================
# Redis 7.2 Configuration — Seismosis Platform
# ============================================================
# Role: Hot lookup cache for recent seismic events and station
#       metadata. Eviction policy: allkeys-lru (cache use case).
#
# Persistence: AOF (everysec) + RDB snapshots.
# AOF protects against up to ~1s of data loss on crash.
# RDB provides point-in-time snapshots for fast restarts.
#
# Memory: 512MB cap with LRU eviction. Sized for approximately
# 200K recent event records at ~2KB each = ~400MB operational.
# ============================================================

# ─── Network ─────────────────────────────────────────────────
# Bind to all interfaces within the container.
# Network-level isolation is handled by Docker's seismosis-net.
bind 0.0.0.0

# TCP port
port 6379

# Backlog for TCP listen queue. Should be <= /proc/sys/net/core/somaxconn
tcp-backlog 511

# Close idle client connections after this many seconds (0 = disabled).
# Set to 300s to clean up hung connections.
timeout 300

# TCP keepalive. Sends ACK every N seconds to dead peer detection.
tcp-keepalive 60

# ─── Security ────────────────────────────────────────────────
# Authentication password. Empty string disables AUTH requirement.
# In production, set via REDIS_PASSWORD environment variable and
# reference here. For Docker, this is handled at container startup.
# If REDIS_PASSWORD is set, the container entrypoint should set:
#   requirepass ${REDIS_PASSWORD}
# For development with no password, leave empty:
requirepass ""

# Disable dangerous commands in production.
# These are renamed to "" to effectively disable them.
# Uncomment for production hardening:
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command DEBUG ""
# rename-command CONFIG ""

# ─── Memory ──────────────────────────────────────────────────
# Maximum memory Redis will use. When limit is reached, eviction
# policy is applied. 512MB for Phase 1 development.
maxmemory 512mb

# Eviction policy: remove least-recently-used keys from ALL keys
# (not just those with TTL set). This is the standard cache policy.
maxmemory-policy allkeys-lru

# Number of samples to consider for LRU approximation.
# Higher = more accurate but slower. 10 is a good balance.
maxmemory-samples 10

# ─── Persistence: AOF (Append-Only File) ─────────────────────
# Enables AOF persistence. Every write operation is appended to the log.
appendonly yes

# AOF file name
appendfilename "appendonly.aof"

# Fsync policy:
#   always   — safest, slowest (sync on every write)
#   everysec — good balance (sync every second, up to 1s data loss)
#   no       — fastest, OS decides when to flush (up to OS buffer loss)
appendfsync everysec

# Do not fsync during AOF rewrite (reduces I/O during rewrite).
# Safe because the in-memory data is the source of truth.
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when AOF grows 100% beyond last rewrite size.
auto-aof-rewrite-percentage 100

# Minimum AOF size before auto-rewrite kicks in.
auto-aof-rewrite-min-size 64mb

# Tolerate truncated AOF on restart (set to yes for crash recovery).
aof-use-rdb-preamble yes

# ─── Persistence: RDB (Snapshotting) ─────────────────────────
# Save to disk if:
#   - 900 seconds elapsed AND at least 1 key changed
#   - 300 seconds elapsed AND at least 10 keys changed
#   - 60  seconds elapsed AND at least 10000 keys changed
save 900 1
save 300 10
save 60 10000

# RDB file name
dbfilename dump.rdb

# Working directory for persistence files (inside the container volume)
dir /data

# Stop accepting writes if RDB save fails.
# Prevents silent data loss if disk is full.
stop-writes-on-bgsave-error yes

# Compress RDB files using LZF.
rdbcompression yes

# CRC64 checksum in RDB files for integrity verification.
rdbchecksum yes

# ─── Replication ─────────────────────────────────────────────
# Phase 1: standalone, no replication.
# Phase 2: configure replica-of for read scaling.
# replica-lazy-flush no (default)

# ─── Slow Log ────────────────────────────────────────────────
# Log queries taking longer than this many microseconds.
# 10000 µs = 10ms. Good default for catching pathological queries.
slowlog-log-slower-than 10000

# Maximum entries in the slow log ring buffer.
slowlog-max-len 256

# ─── Latency Monitoring ──────────────────────────────────────
# Enable latency monitoring for commands taking > 50ms.
latency-monitor-threshold 50

# ─── Keyspace Notifications ──────────────────────────────────
# Notify clients of keyspace events via Pub/Sub.
# "Ex" = expired events. Useful for cache invalidation callbacks.
# Empty string disables notifications (default, saves CPU).
notify-keyspace-events "Ex"

# ─── Advanced ────────────────────────────────────────────────
# Hash encoding: use ziplist when hash has ≤ 128 fields and each
# field is ≤ 64 bytes. Saves memory for small hashes (station metadata).
hash-max-listpack-entries 128
hash-max-listpack-value 64

# Sorted set encoding threshold (seismic event priority queues)
zset-max-listpack-entries 128
zset-max-listpack-value 64

# Active expiry: Redis will actively expire keys in background.
# hz controls how many times per second Redis does background tasks.
hz 20

# Enable active defragmentation to reduce memory fragmentation.
# Requires jemalloc (default allocator in Redis official image).
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# ─── Logging ─────────────────────────────────────────────────
# Log level: debug | verbose | notice | warning
loglevel notice

# Log to stdout (Docker captures this).
logfile ""

# ─── Clients ─────────────────────────────────────────────────
# Maximum simultaneous clients.
maxclients 256
